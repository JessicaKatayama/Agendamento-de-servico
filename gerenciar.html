<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão do Salão</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="top-header">
        <h1>Gestão de Cadastros</h1>
        <div class="header-buttons">
            <a href="agenda.html" class="btn-secondary" style="text-decoration: none;">
                <i class="fa-solid fa-arrow-left"></i> Voltar para Agenda
            </a>
        </div>
    </header>

    <main class="container">
        <div class="card" style="margin-bottom: 2rem;">
            <h2><i class="fa-solid fa-scissors"></i> Serviços</h2>
            
            <form id="form-servico" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-end;">
                <div class="input-group" style="flex: 2; margin-bottom: 0;">
                    <label for="nome-servico">Novo Serviço</label>
                    <input type="text" id="nome-servico" placeholder="Ex: Hidratação" required>
                </div>
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label for="preco-servico">Preço (R$)</label>
                    <input type="number" step="0.01" id="preco-servico" placeholder="Ex: 45.00" required>
                </div>
                <button type="submit" class="btn-primary" style="height: 42px;"><i class="fa-solid fa-plus"></i></button>
            </form>

            <ul id="lista-servicos" class="agenda-lista">
                </ul>
        </div>

        <div class="card">
            <h2><i class="fa-solid fa-users"></i> Profissionais</h2>
            
            <form id="form-profissional" style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: flex-end;">
                <div class="input-group" style="flex: 1; margin-bottom: 0;">
                    <label for="nome-profissional">Novo Profissional</label>
                    <input type="text" id="nome-profissional" placeholder="Ex: Lúcia" required>
                </div>
                <button type="submit" class="btn-primary" style="height: 42px;"><i class="fa-solid fa-plus"></i></button>
            </form>

            <ul id="lista-profissionais" class="agenda-lista">
                </ul>
        </div>
    </main>

    <script src="js/gerenciar.js"></script>
</body>
</html>
